<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50 A Day, Member Companion Guide | Kylie Kelly</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@500;600;700;800&display=swap');
  :root{
    --ink:#1a1a1a;
    --paper:#fff8ef;
    --hotpink:#ff2d8a;
    --magenta:#c026d3;
    --yellow:#ffe98a;
    --mint:#1fd6a5;
    --violet:#6d28d9;
    --cream-card:#fffdf9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;}
  body{
    font-family:'Baloo 2',sans-serif;
    background:var(--ink);
    color:var(--ink);
    display:flex;
    align-items:flex-start;
    min-height:100vh;
    overflow-x:hidden;
  }
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--hotpink);border-radius:3px;}

  .comic-text{
    font-family:'Lilita One',cursive;
    -webkit-text-stroke:2px var(--ink);
    paint-order:stroke fill;
    letter-spacing:0.02em;
  }

  .overlay{display:none;}

  /* SIDEBAR */
  .sidebar{
    width:310px;min-width:310px;
    background:var(--ink);
    color:#fff;
    display:flex;flex-direction:column;
    min-height:100vh;
    border-right:4px solid var(--ink);
  }
  .sidebar-header{
    position:relative;
    padding:36px 26px 22px;
    overflow:hidden;
    background:
      repeating-conic-gradient(from 0deg, var(--hotpink) 0deg 14deg, #ff5cab 14deg 28deg);
    border-bottom:4px solid var(--ink);
  }
  .sidebar-header::before{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.35) 1.4px, transparent 1.4px);
    background-size:10px 10px;
    mix-blend-mode:overlay;
  }
  .sidebar-header-inner{position:relative;z-index:2;}
  .sticker-badge{
    display:inline-block;
    background:var(--yellow);
    border:3px solid var(--ink);
    border-radius:50px;
    padding:3px 14px;
    font-size:11px;
    font-weight:700;
    color:var(--ink);
    box-shadow:3px 3px 0 var(--ink);
    margin-bottom:14px;
    transform:rotate(-3deg);
  }
  .sidebar-title{
    font-size:30px;color:#fff;line-height:1;
    text-shadow:3px 3px 0 var(--ink);
    margin-bottom:8px;
    -webkit-text-stroke:1.5px var(--ink);
  }
  .sidebar-sub{
    font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--ink);
    background:#fff;
    display:inline-block;padding:3px 10px;border-radius:6px;
    border:2px solid var(--ink);
  }

  .progress-wrap{padding:20px 26px;border-bottom:4px solid var(--hotpink);background:#241b22;}
  .progress-label{
    display:flex;justify-content:space-between;align-items:center;
    font-size:12px;color:#fff;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;
  }
  .progress-pct{
    color:var(--ink);background:var(--yellow);
    padding:2px 10px;border-radius:6px;border:2px solid var(--ink);
    font-family:'Lilita One',cursive;font-size:13px;
  }
  .progress-track{
    height:14px;background:#3a2c36;
    border-radius:10px;overflow:hidden;border:2px solid var(--ink);
  }
  .progress-fill{
    height:100%;background:repeating-linear-gradient(135deg,var(--mint) 0 10px,#3ef0bd 10px 20px);
    border-radius:8px;transition:width .35s ease;width:0%;
  }
  .progress-steps{font-size:11px;color:#cbb8c5;margin-top:8px;}
  .resume-banner{
    display:none;
    margin-top:14px;
    background:var(--yellow);
    border:2px solid var(--ink);
    border-radius:10px;
    padding:9px 12px;
    cursor:pointer;
    box-shadow:3px 3px 0 var(--ink);
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .resume-banner.show{display:flex;}
  .resume-banner-text{font-size:11.5px;font-weight:800;color:var(--ink);line-height:1.3;}
  .resume-banner-arrow{font-size:14px;color:var(--ink);flex-shrink:0;}

  .nav-list{flex:1;padding:16px 14px 30px;}
  .nav-item{
    display:flex;align-items:flex-start;gap:12px;
    padding:11px 12px;border-radius:12px;cursor:pointer;
    margin-bottom:8px;transition:transform .12s, background .12s;
    border:2px solid transparent;
  }
  .nav-item:hover{background:#2a2027;transform:translateX(2px);}
  .nav-item.active{
    background:var(--magenta);
    border:2px solid var(--ink);
    box-shadow:3px 3px 0 #000;
  }
  .nav-check{
    width:24px;height:24px;border-radius:50%;
    border:2px solid #6b5b65;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;flex-shrink:0;margin-top:1px;
    color:transparent;transition:all .15s;
    background:#2a2027;
    font-weight:900;
  }
  .nav-check.done{
    background:var(--yellow);border-color:var(--ink);color:var(--ink);
  }
  .nav-item.active .nav-check{border-color:#fff;}
  .nav-tag{
    font-size:9.5px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;
    color:#d9a8c9;margin-bottom:2px;
  }
  .nav-item.active .nav-tag{color:var(--yellow);}
  .nav-name{font-size:13px;color:#eee;line-height:1.3;font-weight:600;}
  .nav-item.active .nav-name{color:#fff;}
  .nav-time{font-size:10px;color:#8a7b85;margin-top:3px;font-weight:600;}
  .nav-item.active .nav-time{color:#f0c9e3;}

  .sidebar-footer{
    padding:18px 26px 26px;font-size:11px;color:#998;
    border-top:2px solid #2a2027;
  }
  .sidebar-footer a{color:var(--yellow);text-decoration:none;font-weight:700;}

  /* MAIN */
  .main{flex:1;min-width:0;position:relative;background:var(--paper);}
  .main::before{
    content:"";position:fixed;inset:0;left:310px;
    background:
      radial-gradient(rgba(192,38,211,0.12) 1.6px, transparent 1.6px) 0 0/16px 16px;
    pointer-events:none;
    z-index:0;
  }
  .main-inner{
    position:relative;z-index:1;
    max-width:740px;margin:0 auto;
    padding:56px 48px 110px;
  }

  .lesson-tag-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .lesson-tag{
    font-family:'Lilita One',cursive;
    font-size:13px;letter-spacing:0.04em;
    background:var(--yellow);
    color:var(--ink);
    padding:5px 16px;border-radius:8px;
    border:3px solid var(--ink);
    box-shadow:3px 3px 0 var(--ink);
    display:inline-block;
    transform:rotate(-2deg);
  }
  .lesson-kicker{
    font-size:14px;font-weight:700;color:var(--magenta);text-transform:uppercase;letter-spacing:0.05em;
  }
  .lesson-title{
    font-family:'Lilita One',cursive;
    font-size:clamp(30px,4.6vw,46px);
    color:var(--ink);
    line-height:1.08;
    margin-bottom:22px;
    -webkit-text-stroke:1.4px var(--ink);
  }
  .lesson-divider{
    height:6px;width:100%;
    background:repeating-linear-gradient(90deg,var(--ink) 0 14px, transparent 14px 22px);
    margin-bottom:30px;
    opacity:0.85;
  }
  .lesson-body p{
    font-size:16.5px;line-height:1.75;color:#2b2320;margin-bottom:18px;font-weight:500;
  }
  .lesson-body strong{color:var(--ink);font-weight:800;}

  .callout{
    background:var(--cream-card);
    border:3px solid var(--ink);
    border-radius:16px;padding:22px 26px;margin:24px 0;
    box-shadow:5px 5px 0 var(--ink);
    position:relative;
  }
  .callout-label{
    font-family:'Lilita One',cursive;
    font-size:13px;
    color:#fff;
    background:var(--magenta);
    display:inline-block;
    padding:4px 14px;border-radius:8px;
    border:2px solid var(--ink);
    margin-bottom:12px;
    transform:rotate(-1.5deg);
  }
  .callout p{margin-bottom:0;font-size:15.5px;}
  .callout ul{margin:0;padding-left:0;list-style:none;}
  .callout li{font-size:15.5px;line-height:1.75;padding-left:28px;position:relative;margin-bottom:8px;font-weight:500;}
  .callout li::before{content:"⚡";position:absolute;left:0;top:-1px;}

  .stat-row{display:flex;gap:14px;margin:26px 0;flex-wrap:wrap;}
  .stat-card{
    flex:1;min-width:140px;
    background:var(--ink);color:#fff;
    border-radius:16px;padding:22px 16px;text-align:center;
    border:3px solid var(--ink);
    box-shadow:5px 5px 0 var(--hotpink);
    transform:rotate(-1deg);
  }
  .stat-card:nth-child(2){transform:rotate(1deg);box-shadow:5px 5px 0 var(--mint);}
  .stat-card:nth-child(3){transform:rotate(-0.5deg);box-shadow:5px 5px 0 var(--yellow);}
  .stat-num{font-family:'Lilita One',cursive;font-size:28px;color:var(--yellow);-webkit-text-stroke:0.6px var(--ink);}
  .stat-label{font-size:11px;color:#f1e6ec;margin-top:6px;text-transform:uppercase;letter-spacing:0.04em;font-weight:700;}

  .bullet-grid{display:flex;flex-direction:column;gap:12px;margin:22px 0;}
  .bullet-item{
    display:flex;gap:14px;align-items:flex-start;
    background:var(--cream-card);
    border:3px solid var(--ink);border-radius:14px;
    padding:15px 18px;font-size:15.5px;line-height:1.65;font-weight:500;
    box-shadow:4px 4px 0 var(--ink);
  }
  .bullet-item .arrow{
    color:#fff;background:var(--hotpink);
    border:2px solid var(--ink);
    width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:900;flex-shrink:0;font-size:13px;
  }

  .action-step{
    background:
      repeating-conic-gradient(from 20deg, var(--violet) 0deg 12deg, #7c3ce8 12deg 24deg);
    color:#fff;border-radius:18px;padding:30px 30px;margin:36px 0 0;
    border:3px solid var(--ink);
    box-shadow:6px 6px 0 var(--ink);
    position:relative;overflow:hidden;
  }
  .action-step::before{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.25) 1.4px, transparent 1.4px);
    background-size:9px 9px;
  }
  .action-step > *{position:relative;z-index:1;}
  .action-step .callout-label{background:var(--yellow);color:var(--ink);}
  .action-step p{color:#fff;font-weight:600;}

  .nav-buttons{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:46px;gap:14px;flex-wrap:wrap;
  }
  .btn{
    font-family:'Lilita One',cursive;font-size:14px;
    letter-spacing:0.02em;
    padding:14px 26px;border-radius:50px;border:3px solid var(--ink);cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;
    box-shadow:4px 4px 0 var(--ink);
    transition:transform .1s, box-shadow .1s;
  }
  .btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink);}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-pink{background:var(--hotpink);color:#fff;}
  .btn-outline{background:#fff;color:var(--ink);}
  .btn:disabled{opacity:0.3;cursor:default;box-shadow:none;}

  /* COMPLETION SCREEN */
  .complete-screen{text-align:center;padding:60px 20px;}
  .complete-emoji{font-size:60px;margin-bottom:18px;}
  .complete-title{
    font-family:'Lilita One',cursive;
    font-size:clamp(28px,4.6vw,42px);margin-bottom:16px;color:var(--ink);
    -webkit-text-stroke:1.4px var(--ink);
  }
  .complete-sub{font-size:16px;color:#3a3230;max-width:480px;margin:0 auto 32px;line-height:1.7;font-weight:500;}
  .complete-card{
    background:var(--cream-card);border:3px solid var(--ink);border-radius:18px;
    padding:32px;max-width:460px;margin:0 auto;
    box-shadow:6px 6px 0 var(--ink);
  }
  .complete-card p{font-size:15px;color:#3a3230;line-height:1.7;margin-bottom:20px;font-weight:500;}

  .takeaway-stamp{
    margin:38px 0 0;
    background:var(--paper);
    border:3px solid var(--ink);
    border-radius:50%/40%;
    padding:24px 30px;
    text-align:center;
    position:relative;
    box-shadow:5px 5px 0 var(--ink);
    transform:rotate(-1.5deg);
  }
  .takeaway-stamp::before{
    content:"";position:absolute;inset:6px;
    border:2px dashed var(--magenta);
    border-radius:50%/40%;
    opacity:0.6;
  }
  .takeaway-boom{
    font-family:'Lilita One',cursive;
    font-size:13px;
    color:var(--hotpink);
    letter-spacing:0.08em;
    margin-bottom:8px;
    -webkit-text-stroke:0.3px var(--ink);
  }
  .takeaway-line{
    font-size:16px;font-weight:800;color:var(--ink);line-height:1.4;
    position:relative;z-index:1;
  }

  .week-checklist{display:flex;flex-direction:column;gap:12px;margin:22px 0;}
  .week-item{
    display:flex;gap:14px;align-items:flex-start;
    background:var(--cream-card);
    border:3px solid var(--ink);border-radius:14px;
    padding:15px 18px;font-size:15.5px;line-height:1.65;font-weight:500;
    box-shadow:4px 4px 0 var(--ink);
    cursor:pointer;
    transition:background .15s;
  }
  .week-item:hover{background:#fff;}
  .week-item.checked{background:#eafff6;}
  .week-checkbox{
    width:28px;height:28px;border-radius:8px;
    border:2.5px solid var(--ink);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;font-weight:900;font-size:15px;color:transparent;
    background:#fff;margin-top:1px;
  }
  .week-checkbox.checked{background:var(--mint);color:var(--ink);}
  .week-item.checked div:last-child{text-decoration:line-through;opacity:0.65;}

  .page-footer{
    margin-top:60px;padding-top:22px;
    border-top:3px dashed var(--ink);
    display:flex;gap:18px;flex-wrap:wrap;align-items:center;
    font-size:12px;color:#6b6058;font-weight:600;
  }
  .page-footer a{color:var(--magenta);text-decoration:none;font-weight:700;}
  .page-footer a:hover{text-decoration:underline;}
  .page-footer .footer-dot{opacity:0.4;}

  .confetti-piece{
    position:fixed;top:-10px;
    width:9px;height:9px;
    z-index:500;pointer-events:none;
    border:1.5px solid var(--ink);
  }
  @keyframes confetti-fall{
    to{ transform:translateY(110vh) rotate(540deg); opacity:0.9; }
  }

  @media(max-width:860px){
    .sidebar{width:260px;min-width:260px;}
    .main-inner{padding:36px 22px 80px;}
  }
  @media(max-width:680px){
    body{flex-direction:column;}
    .sidebar{
      width:100%;min-width:0;min-height:0;
      border-right:none;border-bottom:4px solid var(--ink);
    }
    .main::before{position:absolute;left:0;}
  }
</style>
</head>
<body>


<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-header-inner">
      <div class="sticker-badge">⚡ MEMBER GUIDE</div>
      <div class="sidebar-title comic-text">50 A DAY</div>
      <div class="sidebar-sub">Kylie Kelly · List Growth System</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Your Progress</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-steps" id="progressSteps">0 of 10 modules done</div>
    <div class="resume-banner" id="resumeBanner" onclick="resumeJump()">
      <span class="resume-banner-text" id="resumeBannerText">Continue where you left off</span>
      <span class="resume-banner-arrow">→</span>
    </div>
  </div>

  <div class="nav-list" id="navList"></div>

  <div class="sidebar-footer">
    A Kylie Kelly digital product.<br>
    <a href="https://kyliekelly.com" target="_blank">kyliekelly.com</a>
    <span style="opacity:0.4;"> · </span>
    <a href="https://kyliekelly.com/privacy-policy" target="_blank">Privacy Policy</a>
  </div>
</div>

<div class="main" id="main">
  <div class="main-inner" id="mainInner"></div>
</div>

<script>
const weekPlan = [
  { label: "Week 1", text: "Create or fix your lead magnet using the one-problem, one-solution rule from Module 6." },
  { label: "Week 2", text: "Choose one borrowed audience strategy and one evergreen strategy from Modules 4 and 5." },
  { label: "Week 3", text: "Build your first compounding asset, your first post, pin, or pitch sent." },
  { label: "Week 4", text: "Review your numbers, see where subscribers came from, and optimise before repeating the cycle." }
];

const lessons = [
  {
    tag: "Welcome",
    title: "Welcome &amp; Honest Expectations",
    kicker: "Before We Begin",
    time: "2 min",
    takeaway: "Your email list is the asset you own. This system is how you grow it without social media.",
    html: `
      <p>Congrats on your investment, and welcome. I'm so glad you're here.</p>
      <p>Before we jump in, I want to be honest with you. <strong>This isn't a get-rich-quick strategy.</strong> I'm not going to promise you'll wake up tomorrow with 50 new subscribers. What I am going to show you is the exact system I've used to consistently grow my email list, without relying on social media, posting every day, or running ads.</p>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-num">100+</div><div class="stat-label">subscribers in a quiet month</div></div>
        <div class="stat-card"><div class="stat-num">600+</div><div class="stat-label">subscribers in a strong month</div></div>
      </div>
      <p>The reason for that range is simple: I've built a system that compounds over time. That's exactly what you're going to build inside this mini course.</p>
      <div class="callout">
        <div class="callout-label">How This Guide Works</div>
        <p>Follow along module by module as Kylie walks through the training. Tick off each module as you finish it to track your progress through the course.</p>
      </div>
    `
  },
  {
    tag: "Module 1",
    title: "Your List Is Your Most Valuable Asset",
    kicker: "The Foundation",
    time: "4 min",
    takeaway: "You don't need to go viral. You need a system that compounds, day after day.",
    html: `
      <p>Your email list is the only audience you truly own. Social platforms can change their algorithm, suspend your account, or disappear entirely, and your audience disappears with them.</p>
      <div class="callout">
        <div class="callout-label">Renting vs. Owning</div>
        <ul>
          <li><strong>Rented attention</strong>: social media. You're a guest playing by someone else's rules.</li>
          <li><strong>Owned attention</strong>: your email list. Every subscriber chose to hand you their inbox, and no one can take that away.</li>
        </ul>
      </div>
      <p>This isn't about vanity metrics. It's about creating an audience that you own, and the maths makes the opportunity obvious.</p>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-num">3,650</div><div class="stat-label">subscribers/year at 10 a day</div></div>
        <div class="stat-card"><div class="stat-num">7,300</div><div class="stat-label">subscribers/year at 20 a day</div></div>
        <div class="stat-card"><div class="stat-num">18,250</div><div class="stat-label">subscribers/year at 50 a day</div></div>
      </div>
      <p>You don't need to go viral. You need a system, and every subscriber you add today is someone you can sell to next month, next year, five years from now.</p>
    `
  },
  {
    tag: "Module 2",
    title: "Why Most Women Aren't Growing",
    kicker: "The Real Blockers",
    time: "3 min",
    takeaway: "Consistency beats complexity. A simple system run for 90 days beats a complicated one run for 90 minutes.",
    html: `
      <p>If you've felt stuck on list growth, this should feel like a relief, the problem usually isn't you, it's the strategy you've been told to follow.</p>
      <div class="bullet-grid">
        <div class="bullet-item"><span class="arrow">1</span><div><strong>Social media isn't sustainable on its own.</strong> Posting daily to grow your list puts your business at the mercy of an algorithm you don't control.</div></div>
        <div class="bullet-item"><span class="arrow">2</span><div><strong>Most lead magnets are too broad.</strong> A generic guide doesn't convert because it doesn't promise one specific result.</div></div>
        <div class="bullet-item"><span class="arrow">3</span><div><strong>Consistency matters more than complexity.</strong> A simple system run for 90 days beats a complicated one run for 90 minutes.</div></div>
        <div class="bullet-item"><span class="arrow">4</span><div><strong>The hidden stall reason:</strong> rebuilding your strategy every few weeks instead of letting one system compound.</div></div>
      </div>
    `
  },
  {
    tag: "Module 3",
    title: "The No-Social Growth Framework",
    kicker: "The System",
    time: "4 min",
    takeaway: "Traffic gets people to you. Your lead magnet turns that traffic into subscribers.",
    html: `
      <p>This is the framework that holds the entire system together. Everything else in this course is a deeper dive into one of these pieces.</p>
      <div class="callout">
        <div class="callout-label">Two Parts</div>
        <ul>
          <li><strong>Traffic</strong>: how you get new people discovering your business.</li>
          <li><strong>Conversion</strong>: how you turn that traffic into subscribers.</li>
        </ul>
      </div>
      <div class="bullet-grid">
        <div class="bullet-item"><span class="arrow">⚡</span><div><strong>Borrowed Audiences</strong>: fastest growth. Tap into an audience someone else has already built.</div></div>
        <div class="bullet-item"><span class="arrow">🌱</span><div><strong>Evergreen Visibility</strong>: compounding growth. Keeps working long after you create it.</div></div>
        <div class="bullet-item"><span class="arrow">🧲</span><div><strong>A Lead Magnet That Converts</strong>: the bridge that turns attention into subscribers.</div></div>
      </div>
      <p>All the traffic in the world won't matter if your lead magnet doesn't convert. The next three modules go deep on each piece.</p>
    `
  },
  {
    tag: "Module 4",
    title: "Borrowed Audiences",
    kicker: "Traffic, Part One",
    time: "5 min",

let current = 0;
let completed = JSON.parse(localStorage.getItem('fiftyADayProgressComic') || '[]');
let weekChecked = JSON.parse(localStorage.getItem('fiftyADayWeekChecklist') || '[]');
let hasJumped = false;

function saveProgress(){
  localStorage.setItem('fiftyADayProgressComic', JSON.stringify(completed));
}
function saveWeekChecklist(){
  localStorage.setItem('fiftyADayWeekChecklist', JSON.stringify(weekChecked));
}



function getResumeIndex(){
  if(completed.length === 0) return null;
  const next = Math.max(...completed) + 1;
  if(next >= lessons.length) return null;
  if(completed.includes(next)) return null;
  return next;
}

function renderResumeBanner(){
  const banner = document.getElementById('resumeBanner');
  const idx = getResumeIndex();
  if(idx === null || idx === current){
    banner.classList.remove('show');
    return;
  }
  document.getElementById('resumeBannerText').textContent = `▶ Continue: ${lessons[idx].tag}`;
  banner.classList.add('show');
}

function resumeJump(){
  const idx = getResumeIndex();
  if(idx !== null) goTo(idx);
}

function renderNav(){
  const list = document.getElementById('navList');
  list.innerHTML = lessons.map((l,i) => `
    <div class="nav-item ${i===current?'active':''}" onclick="goTo(${i})">
      <div class="nav-check ${completed.includes(i)?'done':''}">${completed.includes(i) ? '✓' : ''}</div>
      <div>
        <div class="nav-tag">${l.tag}</div>
        <div class="nav-name">${l.title}</div>
        <div class="nav-time">⏱ ${l.time}</div>
      </div>
    </div>
  `).join('');
  const pct = Math.round((completed.length / lessons.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressSteps').textContent = `${completed.length} of ${lessons.length} modules done`;
  renderResumeBanner();
}

function renderWeekChecklist(){
  const wrap = document.getElementById('weekChecklist');
  if(!wrap) return;
  wrap.innerHTML = weekPlan.map((w,i) => `
    <div class="week-item ${weekChecked.includes(i)?'checked':''}" onclick="toggleWeek(${i})">
      <div class="week-checkbox ${weekChecked.includes(i)?'checked':''}">${weekChecked.includes(i) ? '✓' : ''}</div>
      <div><strong>${w.label}:</strong> ${w.text}</div>
    </div>
  `).join('');
}

function toggleWeek(i){
  if(weekChecked.includes(i)){
    weekChecked = weekChecked.filter(x => x !== i);
  } else {
    weekChecked.push(i);
  }
  saveWeekChecklist();
  renderWeekChecklist();
}

function fireConfetti(){
  const colors = ['#ff2d8a','#ffe98a','#1fd6a5','#c026d3','#6d28d9'];
  const count = 26;
  for(let i=0;i<count;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random()*colors.length)];
    piece.style.background = color;
    piece.style.left = (Math.random()*100) + 'vw';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    const duration = 1.4 + Math.random()*1.1;
    const delay = Math.random()*0.25;
    piece.style.animation = `confetti-fall ${duration}s ease-in ${delay}s forwards`;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), (duration+delay)*1000 + 200);
  }
}

function renderMain(){
  const inner = document.getElementById('mainInner');
  const footerHtml = `
    <div class="page-footer">
      <a href="https://kyliekelly.com" target="_blank">kyliekelly.com</a>
      <span class="footer-dot">·</span>
      <a href="https://kyliekelly.com/privacy-policy" target="_blank">Privacy Policy</a>
      <span class="footer-dot">·</span>
      <span>© Kylie Kelly</span>
    </div>
  `;
  if(current >= lessons.length){
    inner.innerHTML = `
      <div class="complete-screen">
        <div class="complete-emoji">🎉</div>
        <div class="complete-title comic-text">YOU FINISHED 50 A DAY!</div>
        <div class="complete-sub">You now have the full system: Borrowed Audiences, Evergreen Visibility, and a converting Lead Magnet. Go run your 30-day plan.</div>
        <div class="complete-card">
          <p>Ready for more? There are other resources waiting for you inside the shop to help with the next piece of the puzzle.</p>
          <a class="btn btn-pink" href="https://kyliekelly.com/shop" target="_blank">Explore the Shop →</a>
        </div>
      </div>
      ${footerHtml}
    `;
    return;
  }
  const l = lessons[current];
  const isDone = completed.includes(current);
  inner.innerHTML = `
    <div class="lesson-tag-row">
      <span class="lesson-tag">${l.tag}</span>
      <span class="lesson-kicker">${l.kicker}</span>
    </div>
    <div class="lesson-title comic-text">${l.title}</div>
    <div class="lesson-divider"></div>
    <div class="lesson-body">${l.html}</div>
    <div class="takeaway-stamp">
      <div class="takeaway-boom">💥 KEY TAKEAWAY</div>
      <div class="takeaway-line">${l.takeaway}</div>
    </div>
    <div class="nav-buttons">
      <button class="btn btn-outline" onclick="goTo(${current-1})" ${current===0?'disabled':''}>← Back</button>
      <button class="btn btn-primary" onclick="markComplete(${current})">${isDone ? '✓ Done!' : 'Mark Complete'}</button>
      <button class="btn btn-pink" onclick="goTo(${current+1})">${current===lessons.length-1 ? 'Finish! →' : 'Next →'}</button>
    </div>
    ${footerHtml}
  `;
  if(current === 8) renderWeekChecklist();
  window.scrollTo(0,0);
}

function goTo(i){
  if(i < 0) return;
  current = Math.min(i, lessons.length);
  renderNav();
  renderMain();
}

function markComplete(i){
  if(!completed.includes(i)){
    completed.push(i);
    saveProgress();
    renderNav();
    fireConfetti();
  }
  goTo(i+1);
}

renderNav();
renderMain();

</script>
